name: Auto-Generate Go Packages

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - master
    paths:
      - 'i18nify-data/country/subdivisions/**'
      - 'i18nify-data/currency/**'
      - 'i18nify-data/bankcodes/**'
      - 'i18nify-data/country/metadata/**'
      - 'i18nify-data/phone-number/country-code-to-phone-number/**'
      - 'i18nify-data/phone-number/dial-code-to-country/**'
      - '!i18nify-data/go/**'
  push:
    branches:
      - master
    paths:
      - 'i18nify-data/country/subdivisions/**'
      - 'i18nify-data/currency/**'
      - 'i18nify-data/bankcodes/**'
      - 'i18nify-data/country/metadata/**'
      - 'i18nify-data/phone-number/country-code-to-phone-number/**'
      - 'i18nify-data/phone-number/dial-code-to-country/**'
      - '!i18nify-data/go/**'

  # Manual trigger via GitHub Actions UI
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to generate'
        required: false
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'country/subdivisions'
          - 'currency'
          - 'bankcodes'
          - 'country/metadata'
          - 'phone-number/country-code-to-phone-number'
          - 'phone-number/dial-code-to-country'
      branch:
        description: 'Branch to run on'
        required: true
        default: 'master'
      release:
        description: 'Create release version (only for master)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-generate-go-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DATA_PACKAGE_REGISTRY: |
    country/subdivisions|i18nify-data/country/subdivisions/|i18nify-data/country/subdivisions/README.md
    currency|i18nify-data/currency/|i18nify-data/currency/README.md
    bankcodes|i18nify-data/bankcodes/|i18nify-data/bankcodes/README.md
    country/metadata|i18nify-data/country/metadata/|i18nify-data/country/metadata/README.md
    phone-number/country-code-to-phone-number|i18nify-data/phone-number/country-code-to-phone-number/|
    phone-number/dial-code-to-country|i18nify-data/phone-number/dial-code-to-country/|

jobs:
  # For PR/push: detect which packages have data changes
  detect-changes:
    name: Detect Data Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    outputs:
      packages: ${{ steps.detect-packages.outputs.packages || '[]' }}
      branch: ${{ github.event.pull_request.head.ref || github.ref_name }}
      pr_number: ${{ github.event.pull_request.number }}
      is_release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if triggering push has i18nify-data changes
        id: trigger-check
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ]; then
            echo "has_data_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE" HEAD)
          HAS_DATA_CHANGES=false

          while IFS= read -r file; do
            case "$file" in
              i18nify-data/go/*|'')
                continue
                ;;
            esac

            while IFS='|' read -r _ prefix ignored_file; do
              if [ -n "$ignored_file" ] && [ "$file" = "$ignored_file" ]; then
                break
              fi

              if [[ "$file" == "$prefix"* ]]; then
                HAS_DATA_CHANGES=true
                break 2
              fi
            done <<< "$DATA_PACKAGE_REGISTRY"
          done <<< "$CHANGED_FILES"

          echo "has_data_changes=$HAS_DATA_CHANGES" >> $GITHUB_OUTPUT

      - name: Detect changed packages
        id: detect-packages
        run: |
          set -euo pipefail

          if [ "${{ steps.trigger-check.outputs.has_data_changes }}" != 'true' ]; then
            echo 'packages=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
            git fetch origin "${{ github.event.pull_request.base.ref }}"
            CHANGED_FILES=$(git diff --name-only "$BASE_REF...HEAD")
          else
            CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" HEAD)
          fi

          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          PACKAGES=''

          add_package() {
            local package="$1"
            case ",${PACKAGES}," in
              *,"${package}",*) ;;
              *) PACKAGES="${PACKAGES}${PACKAGES:+,}\"${package}\"" ;;
            esac
          }

          while IFS= read -r file; do
            case "$file" in
              i18nify-data/go/*|'')
                continue
                ;;
            esac

            while IFS='|' read -r package prefix ignored_file; do
              if [ -n "$ignored_file" ] && [ "$file" = "$ignored_file" ]; then
                break
              fi

              if [[ "$file" == "$prefix"* ]]; then
                add_package "$package"
                break
              fi
            done <<< "$DATA_PACKAGE_REGISTRY"
          done <<< "$CHANGED_FILES"

          PACKAGES="[${PACKAGES}]"

          echo "Detected packages: $PACKAGES"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

  # For workflow_dispatch: get inputs
  check-dispatch:
    name: Parse Manual Dispatch
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      packages: ${{ steps.parse.outputs.packages }}
      branch: ${{ github.event.inputs.branch }}
      is_release: ${{ github.event.inputs.release == 'true' && github.event.inputs.branch == 'master' }}
    steps:
      - name: Parse inputs
        id: parse
        env:
          PACKAGE: ${{ github.event.inputs.package }}
        run: |
          if [ "$PACKAGE" != "all" ] && [ -n "$PACKAGE" ]; then
            echo "packages=[\"$PACKAGE\"]" >> $GITHUB_OUTPUT
          else
            PACKAGES=''

            while IFS='|' read -r package _; do
              PACKAGES="${PACKAGES}${PACKAGES:+,}\"${package}\""
            done <<< "$DATA_PACKAGE_REGISTRY"

            echo "packages=[${PACKAGES}]" >> $GITHUB_OUTPUT
          fi

  # Generate packages
  generate:
    name: Generate ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [detect-changes, check-dispatch]
    if: |
      always() && (
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.packages != '[]' && needs.detect-changes.outputs.packages != '') ||
        (needs.check-dispatch.result == 'success')
      )
    strategy:
      matrix:
        package: ${{ fromJson(needs.check-dispatch.outputs.packages || needs.detect-changes.outputs.packages || '[]') }}
      fail-fast: false
    outputs:
      released_packages: ${{ steps.release-tag.outputs.released_packages }}

    env:
      BRANCH: ${{ needs.check-dispatch.outputs.branch || needs.detect-changes.outputs.branch }}
      PR_NUMBER: ${{ needs.detect-changes.outputs.pr_number || '' }}
      IS_RELEASE: ${{ needs.check-dispatch.outputs.is_release || needs.detect-changes.outputs.is_release }}
      GH_TOKEN: ${{ secrets.CI_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_BOT_TOKEN }}
          ref: ${{ env.BRANCH }}

      - name: Check if proto exists
        id: check-proto
        run: |
          PROTO_DIR="i18nify-data/${{ matrix.package }}/proto"
          if [ -d "$PROTO_DIR" ] && ls "$PROTO_DIR"/*.proto 1> /dev/null 2>&1; then
            echo "has_proto=true" >> $GITHUB_OUTPUT
          else
            echo "has_proto=false" >> $GITHUB_OUTPUT
            echo "⚠️ No proto found for ${{ matrix.package }} - skipping"
          fi

      - name: Setup Go
        if: steps.check-proto.outputs.has_proto == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Install protoc
        if: steps.check-proto.outputs.has_proto == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler jq
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.31.0
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Validate package data
        if: steps.check-proto.outputs.has_proto == 'true'
        run: |
          chmod +x .github/scripts/go/validate-package.sh
          .github/scripts/go/validate-package.sh "${{ matrix.package }}"

      - name: Generate package
        if: steps.check-proto.outputs.has_proto == 'true'
        run: |
          chmod +x .github/scripts/go/generate-package.sh
          chmod +x .github/scripts/go/generate-test.sh
          .github/scripts/go/generate-package.sh "${{ matrix.package }}"

      - name: Verify package (run tests)
        if: steps.check-proto.outputs.has_proto == 'true'
        env:
          GONOSUMDB: github.com/razorpay/i18nify
        run: |
          cd "i18nify-data/go/${{ matrix.package }}"
          echo "Running tests to verify data loads correctly..."
          go test -v ./...
          echo "✅ All tests passed - data is valid and loadable"

      - name: Verify consumer package tests with new data
        if: steps.check-proto.outputs.has_proto == 'true'
        env:
          GONOSUMDB: github.com/razorpay/i18nify
        run: |
          PACKAGE="${{ matrix.package }}"
          DATA_MODULE_PATH="github.com/razorpay/i18nify/i18nify-data/go/${PACKAGE}"
          CONSUMER_MODULE="packages/i18nify-go"

          # Only run if the consumer module actually depends on this data package
          if ! grep -q "$DATA_MODULE_PATH" "${CONSUMER_MODULE}/go.mod"; then
            echo "ℹ️ Consumer module does not depend on ${DATA_MODULE_PATH}, skipping"
            exit 0
          fi

          echo "Running consumer package tests against newly generated data..."

          # Use a temporary Go workspace so the consumer module resolves
          # all local generated packages without modifying go.mod
          go work init
          go work use "./${CONSUMER_MODULE}"
          for pkg_dir in i18nify-data/go/*/ i18nify-data/go/*/*/; do
            [ -f "${pkg_dir}go.mod" ] && go work use "./${pkg_dir}"
          done

          go test -v "./${CONSUMER_MODULE}/modules/..."
          echo "✅ Consumer package tests passed with new data"

      - name: Commit and push generated package
        if: steps.check-proto.outputs.has_proto == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add "i18nify-data/go/${{ matrix.package }}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-regenerate ${{ matrix.package }} Go package"
            git pull --rebase origin "$BRANCH" || true
            if [ "$IS_RELEASE" == "true" ]; then
              TEMP_BRANCH="chore/regen-$(echo "${{ matrix.package }}" | tr '/' '-')-$(git rev-parse --short HEAD)"
              git push origin HEAD:"$TEMP_BRANCH"
              PR_URL=$(gh pr create \
                --title "chore: auto-regenerate ${{ matrix.package }} Go package" \
                --body "Auto-generated by CI after master merge." \
                --base master \
                --head "$TEMP_BRANCH")
              PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
              GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh pr review "$PR_NUMBER" --approve \
                --body "Auto-approved: bot-generated package regeneration."
              gh pr merge --auto --squash "$TEMP_BRANCH" \
                || echo "ℹ️ Auto-merge not enabled — PR created for manual review"
            else
              git push origin HEAD:"$BRANCH"
            fi
          fi

      - name: Generate version
        if: steps.check-proto.outputs.has_proto == 'true'
        id: version
        run: |
          PACKAGE="${{ matrix.package }}"
          # Tag prefix must match the full module path for Go module resolution
          # e.g. country/subdivisions -> i18nify-data/go/country/subdivisions/v1.0.0
          TAG_PREFIX="i18nify-data/go/$PACKAGE"
          
          if [ "$IS_RELEASE" == "true" ]; then
            # For release: get latest tag and bump version
            git fetch --tags origin
            LATEST_TAG=$(git tag -l "${TAG_PREFIX}/v*" --sort=-version:refname | head -n 1 || echo "")
          
            if [ -z "$LATEST_TAG" ]; then
              # No existing tag, start at v1.0.0
              NEW_VERSION="1.0.0"
            else
              # Extract version and bump patch
              CURRENT_VERSION=$(echo "$LATEST_TAG" | sed "s|${TAG_PREFIX}/v||")
              IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
              MAJOR="${VERSION_PARTS[0]}"
              MINOR="${VERSION_PARTS[1]}"
              PATCH="${VERSION_PARTS[2]:-0}"
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi
          
            echo "version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "tag=${TAG_PREFIX}/v${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # For PR/non-release: use pseudo-version
            COMMIT_SHA=$(git rev-parse HEAD)
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-12)
            TIMESTAMP=$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%d%H%M%S "$COMMIT_SHA")
            VERSION="v0.0.0-${TIMESTAMP}-${SHORT_SHA}"
          
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push release tag
        if: steps.check-proto.outputs.has_proto == 'true' && steps.version.outputs.is_release == 'true'
        id: release-tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PACKAGE="${{ matrix.package }}"
          
          git tag -a "$TAG" -m "Release $PACKAGE ${{ steps.version.outputs.version }}"
          git push origin "$TAG"
          
          echo "Released $PACKAGE with tag $TAG"
          echo "released_packages=${PACKAGE}:${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.check-proto.outputs.has_proto == 'true' && env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MODULE="github.com/razorpay/i18nify/i18nify-data/go/${{ matrix.package }}"

          gh pr comment "$PR_NUMBER" --body "## 📦 Package Updated

          **Package:** \`${{ matrix.package }}\`
          **Version:** \`$VERSION\`

          \`\`\`bash
          go get ${MODULE}@${VERSION}
          \`\`\`"

  # Update go.mod once after all matrix jobs finish — avoids parallel push races
  update-go-mod:
    name: Update go.mod dependencies
    runs-on: ubuntu-latest
    needs: [detect-changes, check-dispatch, generate]
    if: |
      always() && (
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.packages != '[]' && needs.detect-changes.outputs.packages != '') ||
        (needs.check-dispatch.result == 'success')
      ) && needs.generate.result == 'success'
    env:
      BRANCH: ${{ needs.check-dispatch.outputs.branch || needs.detect-changes.outputs.branch }}
      IS_RELEASE: ${{ needs.check-dispatch.outputs.is_release || needs.detect-changes.outputs.is_release }}
      PACKAGES: ${{ needs.check-dispatch.outputs.packages || needs.detect-changes.outputs.packages }}
      GONOSUMDB: github.com/razorpay/i18nify
      GOPROXY: direct
      GH_TOKEN: ${{ secrets.CI_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_BOT_TOKEN }}
          ref: ${{ env.BRANCH }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Update go.mod for all changed packages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git fetch --tags origin
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          chmod +x .github/scripts/go/update-dependencies.sh

          PACKAGE_LIST=$(echo "$PACKAGES" | jq -r '.[]' 2>/dev/null || echo "")

          for pkg in $PACKAGE_LIST; do
            MODULE_PATH="github.com/razorpay/i18nify/i18nify-data/go/${pkg}"

            if ! grep -q "$MODULE_PATH" packages/i18nify-go/go.mod; then
              echo "Module $MODULE_PATH not in go.mod, skipping"
              continue
            fi

            if [ "$IS_RELEASE" == "true" ]; then
              TAG_PREFIX="i18nify-data/go/$pkg"
              LATEST_TAG=$(git tag -l "${TAG_PREFIX}/v*" --sort=-version:refname | head -n 1 || echo "")
              if [ -z "$LATEST_TAG" ]; then
                echo "No release tag for $pkg, skipping"
                continue
              fi
              VERSION="v$(echo "$LATEST_TAG" | sed "s|${TAG_PREFIX}/v||")"

              (
                cd packages/i18nify-go
                if grep -q "replace ${MODULE_PATH}" go.mod; then
                  go mod edit -dropreplace "${MODULE_PATH}"
                fi
                go mod edit -require "${MODULE_PATH}@${VERSION}"
              )
            else
              .github/scripts/go/update-dependencies.sh "$pkg"
            fi
          done

          if [ "$IS_RELEASE" == "true" ]; then
            (cd packages/i18nify-go && go mod tidy)
          fi

          git add packages/i18nify-go/go.mod packages/i18nify-go/go.sum

          if git diff --cached --quiet; then
            echo "No go.mod changes to commit"
            exit 0
          fi

          PACKAGES_LABEL=$(echo "$PACKAGES" | jq -r 'join(", ")' 2>/dev/null || echo "data packages")
          git commit -m "chore(go): update go.mod dependencies [${PACKAGES_LABEL}]"

          if [ "$IS_RELEASE" == "true" ]; then
            TEMP_BRANCH="chore/go-mod-release-$(git rev-parse --short HEAD)"
            git push origin HEAD:"$TEMP_BRANCH"
            PR_URL=$(gh pr create \
              --title "chore(go): update go.mod to release versions [${PACKAGES_LABEL}]" \
              --body "Auto-generated by CI: updates data package dependencies to released versions after a master merge." \
              --base master \
              --head "$TEMP_BRANCH")
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh pr review "$PR_NUMBER" --approve \
              --body "Auto-approved: bot-generated go.mod dependency update."
            gh pr merge --auto --squash "$TEMP_BRANCH" \
              || echo "ℹ️ Auto-merge not enabled — PR created for manual review"
          else
            git push origin HEAD:"$BRANCH"
          fi

  # Release i18nify-go with updated dependencies (only on master push)
  release-i18nify-go:
    name: Release i18nify-go
    runs-on: ubuntu-latest
    needs: [detect-changes, update-go-mod]
    if: |
      always() &&
      needs.detect-changes.outputs.is_release == 'true' &&
      needs.update-go-mod.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_BOT_TOKEN }}
          ref: master

      - name: Pull latest changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull origin master

      - name: Get current i18nify-go version
        id: current-version
        run: |
          git fetch --tags origin
          LATEST_TAG=$(git tag -l "i18nify-go/v*" --sort=-version:refname | head -n 1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          else
            echo "version=$(echo "$LATEST_TAG" | sed 's|i18nify-go/v||')" >> $GITHUB_OUTPUT
          fi

      - name: Bump and tag i18nify-go release
        env:
          CURRENT_VERSION: ${{ steps.current-version.outputs.version }}
          PACKAGES: ${{ needs.detect-changes.outputs.packages }}
        run: |
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          NEW_VERSION="${VERSION_PARTS[0]}.$((VERSION_PARTS[1] + 1)).0"
          NEW_TAG="i18nify-go/v${NEW_VERSION}"

          echo "Releasing i18nify-go v${NEW_VERSION}"
          git tag -a "$NEW_TAG" -m "Release i18nify-go v${NEW_VERSION}"
          git push origin "$NEW_TAG"
