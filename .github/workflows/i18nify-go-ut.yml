name: (i18nify-go) Unit Tests

on:
  pull_request:

jobs:
  check-if-i18nify-go:
    runs-on: ubuntu-latest
    outputs:
      modified: ${{ steps.filter.outputs.src }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'packages/i18nify-go/**'
              - 'i18nify-data/go/**'

  run-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: check-if-i18nify-go
    if: |
      needs.check-if-i18nify-go.outputs.modified == 'true' && !(github.head_ref == 'changeset-release/master' && github.actor == 'rzpcibot')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Run Unit Tests
        run: |
          # If any i18nify-data/go/* packages were modified in this PR, use a
          # temporary Go workspace so the consumer tests run against the local
          # versions rather than the pinned published module versions.
          cd $GITHUB_WORKSPACE
          go work init
          go work use ./packages/i18nify-go
          for pkg_dir in i18nify-data/go/*/; do
            [ -f "${pkg_dir}go.mod" ] && go work use "./${pkg_dir}"
          done
          go test -v github.com/razorpay/i18nify/packages/i18nify-go/modules/...
