name: (i18nify-js) Build & Validate

on:
  pull_request:

jobs:
  # JOB to run change detection
  changes:
    runs-on: ubuntu-latest
    # Required permissions
    permissions:
      pull-requests: read
    # Set job outputs to values from filter step
    outputs:
      modified: ${{ steps.filter.outputs.src }}
    steps:
      # For pull requests it's not necessary to checkout the code
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'packages/i18nify-js/**'

  validate:
    name: Validate Source code
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.modified == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20.3.1
      - name: Install dependencies
        run: yarn
      - name: Run eslint
        run: yarn lint
      - name: Run tsc
        run: yarn tsc
      - name: Run build
        run: yarn build
        working-directory: packages/i18nify-js

  build:
    name: Run Build
    runs-on: ubuntu-latest
    if: ${{ needs.path-check.outputs.files-changed == 'true' }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v2
        with:
          node-version: 20.3.1
      - name: Install dependencies
        run: yarn
      - name: run build
        run: yarn build
        working-directory: packages/i18nify-js
