name: (i18nify-go) Consumer Integration Tests

# Simulates an end-user doing `go get github.com/razorpay/i18nify/packages/i18nify-go`.
on:
  pull_request:

jobs:
  check-if-relevant:
    runs-on: ubuntu-latest
    outputs:
      modified: ${{ steps.filter.outputs.src }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'packages/i18nify-go/**'
              - 'i18nify-data/**'

  run-consumer-test:
    name: Run Consumer Integration Tests
    runs-on: ubuntu-latest
    needs: check-if-relevant
    if: |
      needs.check-if-relevant.outputs.modified == 'true' &&
      !(github.head_ref == 'changeset-release/master' && github.actor == 'rzpcibot')
    env:
      GONOSUMDB: github.com/razorpay/i18nify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Run consumer integration tests
        run: |
          echo "::group::Setup — init consumer module"
          TEST_DIR=/tmp/i18nify-consumer-test
          mkdir -p "$TEST_DIR"
          cd "$TEST_DIR"
          go mod init consumer-test
          echo "Module initialised at ${TEST_DIR}"
          echo "::endgroup::"

          echo "::group::Setup — add i18nify-go via local checkout"
          # Use the workspace checkout so fork PRs (where the branch doesn't
          # exist in the upstream repo) resolve correctly. This tests the
          # actual code in the PR rather than a published version.
          # The special zero pseudo-version is required when using a local
          # directory replace directive.
          go mod edit \
            -require github.com/razorpay/i18nify/packages/i18nify-go@v0.0.0-00010101000000-000000000000 \
            -replace github.com/razorpay/i18nify/packages/i18nify-go="${GITHUB_WORKSPACE}/packages/i18nify-go"
          echo "go.mod after edit:"
          cat go.mod
          echo "::endgroup::"

          cat > integration_test.go << 'GOEOF'
          package consumer

          import (
          	"testing"

          	"github.com/razorpay/i18nify/packages/i18nify-go/modules/bankcodes"
          	"github.com/razorpay/i18nify/packages/i18nify-go/modules/country_metadata"
          	"github.com/razorpay/i18nify/packages/i18nify-go/modules/country_subdivisions"
          	"github.com/razorpay/i18nify/packages/i18nify-go/modules/currency"
          	"github.com/razorpay/i18nify/packages/i18nify-go/modules/phonenumber"
          )

          func TestCurrency_GetCurrencyInformation(t *testing.T) {
          	info, err := currency.GetCurrencyInformation("USD")
          	if err != nil {
          		t.Fatalf("GetCurrencyInformation(USD): %v", err)
          	}
          	if info.Name != "US Dollar" {
          		t.Errorf("expected 'US Dollar', got %q", info.Name)
          	}
          	if info.Symbol != "$" {
          		t.Errorf("expected '$', got %q", info.Symbol)
          	}
          	if info.NumericCode != "840" {
          		t.Errorf("expected '840', got %q", info.NumericCode)
          	}
          }

          func TestCurrency_GetCurrencySymbol(t *testing.T) {
          	sym, err := currency.GetCurrencySymbol("INR")
          	if err != nil {
          		t.Fatalf("GetCurrencySymbol(INR): %v", err)
          	}
          	if sym != "\u20b9" {
          		t.Errorf("expected INR symbol, got %q", sym)
          	}
          }

          func TestCurrency_GetCurrencyCodeByISONumericCode(t *testing.T) {
          	code, err := currency.GetCurrencyCodeByISONumericCode("356")
          	if err != nil {
          		t.Fatalf("GetCurrencyCodeByISONumericCode(356): %v", err)
          	}
          	if code != "INR" {
          		t.Errorf("expected 'INR', got %q", code)
          	}
          }

          func TestCurrency_UnknownCode(t *testing.T) {
          	_, err := currency.GetCurrencyInformation("ZZZ")
          	if err == nil {
          		t.Error("expected error for unknown currency code, got nil")
          	}
          }

          func TestBankcodes_GetAllBanksWithShortCodes(t *testing.T) {
          	banks, err := bankcodes.GetAllBanksWithShortCodes("US")
          	if err != nil {
          		t.Fatalf("GetAllBanksWithShortCodes(US): %v", err)
          	}
          	if len(banks) == 0 {
          		t.Error("expected non-empty bank map for US")
          	}
          	if _, ok := banks["USBK"]; !ok {
          		t.Error("expected USBK in US bank list")
          	}
          }

          func TestBankcodes_IsValidBankIdentifier_SWIFT(t *testing.T) {
          	valid, err := bankcodes.IsValidBankIdentifier("US", "SWIFT", "BNNEUS66")
          	if err != nil {
          		t.Fatalf("IsValidBankIdentifier(SWIFT): %v", err)
          	}
          	if !valid {
          		t.Error("expected BNNEUS66 to be a valid SWIFT code for US")
          	}
          }

          func TestBankcodes_IsValidBankIdentifier_IFSC(t *testing.T) {
          	valid, err := bankcodes.IsValidBankIdentifier("IN", "IFSC", "ABHY0065001")
          	if err != nil {
          		t.Fatalf("IsValidBankIdentifier(IFSC): %v", err)
          	}
          	if !valid {
          		t.Error("expected ABHY0065001 to be a valid IFSC code for IN")
          	}
          }

          func TestBankcodes_GetBankNameFromShortCode(t *testing.T) {
          	name, err := bankcodes.GetBankNameFromShortCode("US", "USBK")
          	if err != nil {
          		t.Fatalf("GetBankNameFromShortCode: %v", err)
          	}
          	if name == "" {
          		t.Error("expected non-empty bank name for USBK")
          	}
          }

          func TestBankcodes_GetBankNameFromBankIdentifier(t *testing.T) {
          	name, err := bankcodes.GetBankNameFromBankIdentifier("US", "USBKUS44")
          	if err != nil {
          		t.Fatalf("GetBankNameFromBankIdentifier: %v", err)
          	}
          	if name == "" {
          		t.Error("expected non-empty bank name")
          	}
          }

          func TestBankcodes_InvalidCountry(t *testing.T) {
          	_, err := bankcodes.GetAllBanksWithShortCodes("ZZ")
          	if err == nil {
          		t.Error("expected error for non-existent country ZZ")
          	}
          }

          func TestCountryMetadata_GetMetadataInformation(t *testing.T) {
          	info := country_metadata.GetMetadataInformation("IN")
          	if info.CountryName != "India" {
          		t.Errorf("expected 'India', got %q", info.CountryName)
          	}
          	if info.Alpha3 != "IND" {
          		t.Errorf("expected alpha3 'IND', got %q", info.Alpha3)
          	}
          	if info.DialCode != "+91" {
          		t.Errorf("expected dial code '+91', got %q", info.DialCode)
          	}
          	if len(info.SupportedCurrency) == 0 {
          		t.Error("expected non-empty SupportedCurrency for India")
          	}
          }

          func TestCountryMetadata_GetMetadataInformationByISONumericCode(t *testing.T) {
          	info := country_metadata.GetMetadataInformationByISONumericCode("356")
          	if info.CountryName != "India" {
          		t.Errorf("expected 'India' for numeric code 356, got %q", info.CountryName)
          	}
          }

          func TestCountryMetadata_GetCountryCodeFromAlpha3(t *testing.T) {
          	code := country_metadata.GetCountryCodeFromAlpha3("IND")
          	if code != "IN" {
          		t.Errorf("expected 'IN' for IND, got %q", code)
          	}
          }

          func TestCountryMetadata_GetCountryCodeISO2(t *testing.T) {
          	code := country_metadata.GetCountryCodeISO2("India")
          	if code != "IN" {
          		t.Errorf("expected 'IN' for 'India', got %q", code)
          	}
          }

          func TestCountrySubdivisions_GetCountrySubdivisions(t *testing.T) {
          	data := country_subdivisions.GetCountrySubdivisions("IN")
          	if data.CountryName == "" {
          		t.Error("expected non-empty country name for IN")
          	}
          	if len(data.States) == 0 {
          		t.Error("expected non-empty states for IN")
          	}
          }

          func TestCountrySubdivisions_GetAvailableCountryCodes(t *testing.T) {
          	codes, err := country_subdivisions.GetAvailableCountryCodes()
          	if err != nil {
          		t.Fatalf("GetAvailableCountryCodes: %v", err)
          	}
          	if len(codes) == 0 {
          		t.Error("expected non-empty country codes list")
          	}
          }

          func TestCountrySubdivisions_InvalidCode(t *testing.T) {
          	data := country_subdivisions.GetCountrySubdivisions("ZZ")
          	if data.CountryName != "" {
          		t.Error("expected empty result for non-existent country code ZZ")
          	}
          }

          func TestPhoneNumber_GetCountryTeleInformation(t *testing.T) {
          	info := phonenumber.GetCountryTeleInformation("IN")
          	if info.DialCode != "+91" {
          		t.Errorf("expected '+91' for IN, got %q", info.DialCode)
          	}
          	if info.Format == "" {
          		t.Error("expected non-empty format for IN")
          	}
          	if info.Regex == "" {
          		t.Error("expected non-empty regex for IN")
          	}
          }

          func TestPhoneNumber_EmptyCode(t *testing.T) {
          	info := phonenumber.GetCountryTeleInformation("")
          	if info.DialCode != "" {
          		t.Error("expected empty result for empty country code")
          	}
          }

          func TestPhoneNumber_InvalidCode(t *testing.T) {
          	info := phonenumber.GetCountryTeleInformation("ZZ")
          	if info.DialCode != "" {
          		t.Error("expected empty result for non-existent country code ZZ")
          	}
          }
          GOEOF

          echo "::group::Setup — write integration test file"
          echo "Writing integration_test.go..."
          echo "::endgroup::"

          echo "::group::Setup — go mod tidy"
          go mod tidy
          echo "go.mod after tidy:"
          cat go.mod
          echo "::endgroup::"

          echo "::group::Run integration tests"
          go test -v ./...
          echo "::endgroup::"

          echo "✅ All consumer integration tests passed"
