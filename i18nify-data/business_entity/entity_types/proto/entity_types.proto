syntax = "proto3";

package business_entity;

option go_package = "github.com/razorpay/i18nify/i18nify-data/go/business_entity/entity_types;business_entity_entity_types";

// EntityTypesData is the root message for the entity_types package.
// The map key is the ISO 3166-1 alpha-2 country code (e.g. "IN", "US", "GB").
message EntityTypesData {
  map<string, EntityTypeList> entity_types = 1 [json_name = "entity_types"];
}

// EntityTypeList wraps repeated EntityType as a map value (proto3 maps cannot
// hold repeated values directly).
message EntityTypeList {
  repeated EntityType items = 1;
}

// EntityType represents a legal business entity type for a specific country,
// sourced from the GLEIF ISO 20275 Entity Legal Forms (ELF) code list.
message EntityType {
  string code                = 1;
  string name                = 2;
  string abbreviation        = 3;
  string transliterated_name = 4 [json_name = "transliterated_name"];
  string language            = 5;
}
