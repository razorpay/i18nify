syntax = "proto3";
package address;
option go_package = "github.com/razorpay/i18nify/i18nify-data/go/address;address";

// AddressData is the root message.
// The map key is the ISO 3166-1 alpha-2 country code.
message AddressData {
  map<string, AddressInfo> address_format_information = 1;
}

// Language represents a language spoken in a country.
message Language {
  string code = 1;
  string name = 2;
}

// AddressInfo holds all address format fields for a single country entry.
message AddressInfo {
  string country_name = 1;
  string template = 2;
  repeated string required_fields = 3;
  repeated string allowed_fields = 4;
  string latin_template = 5;
  repeated string upper_case_fields = 6;
  string zip_name_type = 7;
  string state_name_type = 8;
  string locality_name_type = 9;
  string sublocality_name_type = 10;
  string lang = 11;
  repeated Language languages = 12;
  string zip_regex = 13;
  string zipex = 14;
  string posturl = 15;
}
