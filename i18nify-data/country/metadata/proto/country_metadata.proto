syntax = "proto3";

package country_metadata;

option go_package = "github.com/razorpay/i18nify/i18nify-data/go/country/metadata;country_metadata";

// CountryMetadataData contains metadata information for all countries.
// Data files: data.json
message CountryMetadataData {
  map<string, CountryMetadata> metadata_information = 1;
  repeated SupportedDateFormat supported_date_formats = 2 [json_name = "supported_date_formats"];
}

// SupportedDateFormat describes a globally accepted date/time input pattern.
message SupportedDateFormat {
  string regex = 1;
  int32 year_index = 2 [json_name = "year_index"];
  int32 month_index = 3 [json_name = "month_index"];
  int32 day_index = 4 [json_name = "day_index"];
  int32 hour_index = 5 [json_name = "hour_index"];
  int32 minute_index = 6 [json_name = "minute_index"];
  int32 second_index = 7 [json_name = "second_index"];
  string format = 8;
}

// CountryMetadata contains metadata for a specific country.
message CountryMetadata {
  string country_name = 1;
  string continent_code = 2;
  string continent_name = 3;
  string alpha_3 = 4;
  string numeric_code = 5;
  string flag = 6;
  string sovereignty = 7;
  string dial_code = 8;
  repeated string supported_currency = 9;
  map<string, TimezoneInfo> timezones = 10;
  string timezone_of_capital = 11;
  map<string, LocaleInfo> locales = 12;
  string default_locale = 13;
  string default_currency = 14;
}

// TimezoneInfo contains timezone details.
message TimezoneInfo {
  string utc_offset = 1;
}

// LocaleInfo contains locale details including country-specific date formatting
// moved from the shared datetime dataset.
message LocaleInfo {
  string name = 1;
  string date_order = 2;
  string date_separator = 3;
}
