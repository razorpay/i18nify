syntax = "proto3";

package dial_code_to_country;

// Import the Struct proto which contains ListValue (for JSON arrays)
import "google.protobuf/struct.proto";

// Data files: data.json
message DialCodeToCountryData {
  // Maps the dial code string to a generic JSON array
  map<string, google.protobuf.ListValue> dial_code_to_country = 1;
}